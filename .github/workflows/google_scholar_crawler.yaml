name: Get Citation Data

on:
  page_build:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

concurrency:
  group: google-scholar-crawler
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: google_scholar_crawler/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r google_scholar_crawler/requirements.txt

      - name: Fetch citation data
        working-directory: google_scholar_crawler
        run: timeout 6m python main.py
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}

      - name: Publish citation data
        working-directory: google_scholar_crawler/results
        run: |
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- *.json
          git commit -m "Update citation data"
          remote_repo="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git push "${remote_repo}" HEAD:google-scholar-stats --force
